    const GAS_URL = window.GAS_URL || "https://script.google.com/macros/s/AKfycbzYr-LKntPHYccZi_D89ohJ7Ct66D_qBG4qTUypKwV01ZmbWK206bY0ETt2VonQfyUMWA/exec";

    // ── GAS API Helpers ──────────────────────────────────────────
    // PENTING: GAS Web App melakukan redirect 302, dan query params
    // HILANG saat redirect. Solusi: kirim semua data via POST body
    // dengan content-type text/plain (simple request = no preflight CORS)
    // GAS membaca body di doPost via e.postData.contents

    async function gasCall(payload) {
      // Kirim sebagai POST text/plain — bypass CORS preflight sekaligus
      // tidak kehilangan data saat GAS redirect
      const res = await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload),
        redirect: 'follow'
      });
      const text = await res.text();
      try { return JSON.parse(text); }
      catch(e) { throw new Error('Response bukan JSON: ' + text.substring(0, 100)); }
    }

    // gasGet tetap pakai GET untuk getData (read-only, tidak ada data dikirim)
    async function gasGet(params) {
      const url = new URL(GAS_URL);
      Object.entries(params).forEach(([k,v]) => url.searchParams.append(k, v));
      const res = await fetch(url.toString(), { method: 'GET', redirect: 'follow' });
      const text = await res.text();
      try { return JSON.parse(text); }
      catch(e) { throw new Error('Response bukan JSON: ' + text.substring(0, 100)); }
    }

    // gasPost sekarang pakai gasCall (POST text/plain)
    async function gasPost(body) {
      return gasCall(body);
    }

    function sanitizeCoordinate(input) {
      let value = input.value.replace(/\./g, ',');
      let sanitized = '';
      let hasComma = false;
      
      for (let i = 0; i < value.length; i++) {
        let char = value[i];
        if (char === '-' && i === 0) {
          sanitized += '-';
        } else if (char === ',') {
          if (!hasComma) {
            sanitized += ',';
            hasComma = true;
          }
        } else if (/\d/.test(char)) {
          sanitized += char;
        }
      }
      
      if (input.value !== sanitized) {
        input.value = sanitized;
      }
    }

    function filterPeriod(period) {
      activeFilter = period;
      document.querySelectorAll('.period-tab').forEach(b => {
        b.classList.remove('bg-brand-600', 'text-white', 'dark:bg-brand-500');
        b.classList.add('text-gray-500', 'dark:text-gray-400');
      });
      const activeBtn = document.getElementById('btn-p-' + period);
      if (activeBtn) {
        activeBtn.classList.remove('text-gray-500', 'dark:text-gray-400');
        activeBtn.classList.add('bg-brand-600', 'text-white');
      }
      renderModuleButtons();
    }

    function renderModuleButtons() {
      const container = document.getElementById('moduleList');
      container.innerHTML = '';
      
      const activeModuleCode = document.getElementById('activeModule').value;
      
      Object.keys(modulesMap).forEach(code => {
        const item = modulesMap[code];
        
        if (item.period !== activeFilter) {
          return;
        }
        
        const isActive = activeModuleCode === code;
        
        const colorBadge = item.period === 'Bulanan' ? 'bg-blue-100 text-blue-800 dark:bg-blue-950/50 dark:text-blue-300' :
                           item.period === 'Triwulan' ? 'bg-amber-100 text-amber-800 dark:bg-amber-950/50 dark:text-amber-300' :
                           item.period === 'Semester' ? 'bg-purple-100 text-purple-800 dark:bg-purple-950/50 dark:text-purple-300' :
                           'bg-teal-100 text-teal-800 dark:bg-teal-950/50 dark:text-teal-300';
        
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.onclick = () => selectModule(code);
        btn.className = `w-full text-left p-4 rounded-2xl border transition-all flex items-start justify-between space-x-3 ${
          isActive 
            ? 'bg-brand-50 border-brand-500/50 dark:bg-brand-950/20 dark:border-brand-500/50 ring-1 ring-brand-500/50' 
            : 'bg-gray-50/50 border-gray-100 hover:bg-gray-100 dark:bg-gray-900/50 dark:border-gray-800 dark:hover:bg-gray-800'
        }`;
        
        btn.innerHTML = `
          <div class="space-y-1">
            <span class="text-[10px] font-extrabold text-brand-600 dark:text-brand-400 tracking-wider">${code}</span>
            <p class="text-xs font-bold text-gray-800 dark:text-white leading-snug">${item.title}</p>
          </div>
          <span class="text-[9px] px-2.5 py-0.5 rounded-full font-bold uppercase shrink-0 ${colorBadge}">${item.period}</span>
        `;
        
        container.appendChild(btn);
      });
    }

    function exitEditMode() {
      document.getElementById('editRowId').value = '';
      document.getElementById('editModeBadge').classList.add('hidden');
      document.getElementById('cancelEditBtn').classList.add('hidden');
      document.getElementById('resetBtn').classList.remove('hidden');
      
      document.getElementById('submitBtnText').innerText = "Kirim Laporan";
      document.getElementById('submitBtnIcon').className = "fa-regular fa-paper-plane";
      document.getElementById('submitBtn').className = "px-6 py-3 text-xs font-bold bg-brand-600 hover:bg-brand-700 text-white rounded-xl shadow-lg shadow-brand-500/20 transition flex items-center space-x-2";
      
      document.getElementById('conservationForm').reset();
      
      // Ensure readonly field stays populated
      if (document.getElementById('field_unit_kerja')) {
        document.getElementById('field_unit_kerja').value = "Balai KSDA Kalimantan Timur";
      }
    }

    function showAlert(type, message) {
      const box = document.getElementById('alertBox');
      box.className = "mb-6 p-4 rounded-2xl flex items-start space-x-3 transition-all";
      box.classList.remove('hidden');
      
      let icon = '';
      if (type === 'success') {
        box.classList.add('bg-emerald-50', 'text-emerald-800', 'border', 'border-emerald-200', 'dark:bg-emerald-950/40', 'dark:text-emerald-300', 'dark:border-emerald-800');
        icon = '<i class="fa-solid fa-circle-check text-lg mt-0.5"></i>';
      } else if (type === 'error') {
        box.classList.add('bg-rose-50', 'text-rose-800', 'border', 'border-rose-200', 'dark:bg-rose-950/40', 'dark:text-rose-300', 'dark:border-rose-800');
        icon = '<i class="fa-solid fa-circle-exclamation text-lg mt-0.5"></i>';
      } else {
        box.classList.add('bg-blue-50', 'text-blue-800', 'border', 'border-blue-200', 'dark:bg-blue-950/40', 'dark:text-blue-300', 'dark:border-blue-800');
        icon = '<i class="fa-solid fa-circle-info text-lg mt-0.5"></i>';
      }
      
      box.innerHTML = `
        ${icon}
        <div>
          <p class="text-xs font-bold leading-relaxed">${message}</p>
        </div>
      `;
      box.scrollIntoView({ behavior: 'smooth' });
    }

    function hideAlert() {
      document.getElementById('alertBox').classList.add('hidden');
    }

    function handleFormSubmission(event) {
      event.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      const originalText = submitBtn.innerHTML;
      const loader = document.getElementById('globalLoading');
      
      submitBtn.disabled = true;
      loader.classList.remove('hidden');
      
      const moduleCode = document.getElementById('activeModule').value;
      const form = document.getElementById('conservationForm');
      const formData = new FormData(form);
      
      let fields = {};
      formData.forEach((val, key) => {
        fields[key] = val;
      });

      gasPost({ action: 'submit', moduleCode: moduleCode, fields: fields })
        .then((response) => {
          submitBtn.disabled = false;
          loader.classList.add('hidden');
          if (response.success) {
            showAlert('success', response.message);
            exitEditMode();
            const activePeriodType = document.getElementById('activePeriodType').value;
            renderPeriodFields(activePeriodType);
            renderDynamicFields(moduleCode);
            loadHistoryData();
          } else {
            showAlert('error', "Gagal Menyimpan: " + response.message);
          }
        })
        .catch((err) => {
          submitBtn.disabled = false;
          loader.classList.add('hidden');
          showAlert('error', "Gagal terhubung ke database: " + err.message);
        });
    }

    function loadHistoryData() {
      const moduleCode = document.getElementById('activeModule').value;
      const tableHeaderRow = document.getElementById('historyTableHeaderRow');
      const tableBody = document.getElementById('historyTableBody');
      const columnsList = columnsMap[moduleCode] || [];
      
      // Clear Search input when changing module or refreshing
      document.getElementById('dbSearch').value = '';

      // 1. Render Table Headers dynamically according to module configurations
      tableHeaderRow.innerHTML = '';
      columnsList.forEach(col => {
        const th = document.createElement('th');
        th.className = "p-3 font-semibold text-gray-600 dark:text-gray-300 tracking-wider";
        th.innerText = col;
        tableHeaderRow.appendChild(th);
      });
      // Add the final action column header
      const actionTh = document.createElement('th');
      actionTh.className = "p-3 font-semibold text-gray-600 dark:text-gray-300 tracking-wider text-center w-28";
      actionTh.innerText = "Aksi";
      tableHeaderRow.appendChild(actionTh);

      // Show Loading Body
      tableBody.innerHTML = `
        <tr>
          <td colspan="${columnsList.length + 1}" class="p-12 text-center text-gray-400 dark:text-gray-500">
            <i class="fa-solid fa-spinner animate-spin text-lg mb-2 block text-brand-600"></i>
            Menyelaraskan data Rekapitulasi...
          </td>
        </tr>
      `;
      
      // 2. Fetch recent database from Sheets via GAS API
      gasGet({ action: 'getData', module: moduleCode })
        .then((result) => {
          loadedHistoryRecords = (result.data) || [];
          renderTableRows(loadedHistoryRecords);
        })
        .catch(() => {
          tableBody.innerHTML = `
            <tr>
              <td colspan="${columnsList.length + 1}" class="p-8 text-center text-rose-500 font-bold">
                Gagal memuat log data terbaru. Cek GAS_URL di konfigurasi.
              </td>
            </tr>
          `;
        });
    }

    // Render Rows into the body dynamically
    function renderTableRows(records) {
      const moduleCode = document.getElementById('activeModule').value;
      const tableBody = document.getElementById('historyTableBody');
      const columnsList = columnsMap[moduleCode] || [];

      if (!records || records.length === 0) {
        tableBody.innerHTML = `
          <tr>
            <td colspan="${columnsList.length + 1}" class="p-16 text-center text-gray-400 dark:text-gray-500">
              <div class="flex flex-col items-center justify-center space-y-3">
                <i class="fa-regular fa-folder-open text-4xl opacity-50"></i>
                <p class="text-sm">Belum ada entri data pada modul ini.</p>
              </div>
            </td>
          </tr>
        `;
        return;
      }

      tableBody.innerHTML = '';
      records.forEach(item => {
        const tr = document.createElement('tr');
        tr.className = "border-b border-gray-100 dark:border-gray-800/80 hover:bg-gray-50/50 dark:hover:bg-gray-900/30 transition-all";
        
        // Loop dynamic values matches header keys
        columnsList.forEach(col => {
          const td = document.createElement('td');
          td.className = "p-3 font-medium text-gray-700 dark:text-gray-300";
          
          let val = item[col] || '-';
          
          if (col === 'Satuan Kerja') {
            td.className = "p-3 font-bold text-gray-900 dark:text-white";
          }
          
          td.innerText = val;
          tr.appendChild(td);
        });

        // Append custom action block column at the right end
        const tdAction = document.createElement('td');
        tdAction.className = "p-3 text-center";
        // Buat tombol secara programatik agar tidak ada masalah escaping/template
        const divAct = document.createElement('div');
        divAct.className = 'flex items-center justify-center space-x-1.5';

        const editBtn = document.createElement('button');
        editBtn.type = 'button';
        editBtn.className = 'p-2 bg-amber-50 hover:bg-amber-100 text-amber-700 dark:bg-amber-950/40 dark:text-amber-300 rounded-lg text-xs transition-all';
        editBtn.title = 'Edit Data';
        editBtn.innerHTML = '<i class="fa-solid fa-pencil"></i>';
        editBtn.addEventListener('click', () => enterEditMode(item.ID));

        const delBtn = document.createElement('button');
        delBtn.type = 'button';
        delBtn.className = 'p-2 bg-rose-50 hover:bg-rose-100 text-rose-700 dark:bg-rose-950/40 dark:text-rose-300 rounded-lg text-xs transition-all';
        delBtn.title = 'Hapus Data';
        delBtn.innerHTML = '<i class="fa-solid fa-trash-can"></i>';
        // Simpan nilai langsung di closure, 100% aman dari masalah escaping/undefined
        const capturedModule = moduleCode;
        const capturedId = item.ID;
        delBtn.addEventListener('click', () => openDeleteModal(capturedModule, capturedId));

        divAct.appendChild(editBtn);
        divAct.appendChild(delBtn);
        tdAction.appendChild(divAct);
        tr.appendChild(tdAction);
        tableBody.appendChild(tr);
      });
    }

    // Client-Side Live Search Engine
    function applyClientSideSearch() {
      const query = document.getElementById('dbSearch').value.toLowerCase().trim();
      if (!query) {
        renderTableRows(loadedHistoryRecords);
        return;
      }

      const filtered = loadedHistoryRecords.filter(row => {
        return Object.values(row).some(val => 
          String(val).toLowerCase().includes(query)
        );
      });

      renderTableRows(filtered);
    }

    // Modal delete workflows
    function openDeleteModal(moduleCode, id) {
      // Fallback: jika moduleCode undefined/kosong, ambil dari prefix ID (misal "C.01-178..." → "C.01")
      if (!moduleCode || moduleCode === 'undefined') {
        const match = String(id).match(/^(C\.\d+)-/);
        moduleCode = match ? match[1] : document.getElementById('activeModule').value;
      }
      targetDeleteModule = moduleCode;
      targetDeleteId = id;
      
      const modal = document.getElementById('deleteConfirmModal');
      modal.classList.remove('hidden');
      
      document.getElementById('confirmDeleteBtn').onclick = () => executeRowDeletion();
    }

    function closeDeleteModal() {
      document.getElementById('deleteConfirmModal').classList.add('hidden');
      targetDeleteModule = null;
      targetDeleteId = null;
    }

    function executeRowDeletion() {
      if (!targetDeleteModule || !targetDeleteId) return;
      
      closeDeleteModal();
      const loader = document.getElementById('globalLoading');
      loader.classList.remove('hidden');
      
      gasPost({ action: 'delete', moduleCode: targetDeleteModule, id: targetDeleteId })
        .then((res) => {
          loader.classList.add('hidden');
          if (res.success) {
            showAlert('success', res.message);
            loadHistoryData();
          } else {
            showAlert('error', res.message);
          }
        })
        .catch((err) => {
          loader.classList.add('hidden');
          showAlert('error', "Gagal menghapus data: " + err.message);
        });
    }

    window.onload = function() {
      // Setup Initial filters state
      filterPeriod('Bulanan');
      selectModule('C.01');
    }
  </script>
